# Publishes quickjs-emscripten-sync to npm with provenance via npm Trusted
# Publishing (OIDC).
#
# Prerequisites (one-time setup, do these BEFORE the first tag push):
#   1. On npmjs.com: package settings → Trusted publishers → add this repo
#      (reearth/quickjs-emscripten-sync) and this workflow filename
#      (publish.yml). This tells npm to accept OIDC tokens minted by this
#      exact workflow instead of an NPM_TOKEN secret.
#   2. On GitHub: Settings → Environments → create `npm-publish` with required
#      reviewers. The publish job pauses for manual approval, so a compromised
#      tag push can't auto-publish.
#
# Release flow:
#   1. Run the `Release` workflow (release.yml) to open a release PR.
#   2. Merge the PR.
#   3. Push the matching tag (e.g. `v1.9.0`). This workflow fires.
#   4. Approve the `npm-publish` environment in the run page.
#   5. npm receives the package with a provenance attestation; anyone can
#      verify with `npm audit signatures`.
#
# Dist-tag selection:
#   Stable tags like `v1.9.0` publish to the default `latest` dist-tag —
#   `npm install quickjs-emscripten-sync` picks them up automatically.
#   Pre-release tags like `v1.9.0-rc.0` or `v2.0.0-beta.1` (anything with a
#   hyphen) publish to the `next` dist-tag instead, so they don't replace
#   `latest`. Users opt in via `npm install quickjs-emscripten-sync@next`.

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  npm:
    name: npm publish
    runs-on: ubuntu-latest
    environment: npm-publish # gates publish on required reviewer approval
    permissions:
      contents: read
      id-token: write # for npm provenance and trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # npm Trusted Publishing requires Node >=22.14 and npm >=11.5.1.
          # We activate the npm version pinned in package.json's
          # `packageManager` field via corepack below.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - name: Activate npm version pinned in package.json (via corepack)
        # `packageManager: "npm@X.Y.Z"` in package.json is the source of
        # truth; corepack installs that exact version. This keeps local dev
        # npm and CI npm in lockstep, and ensures the >=11.5.1 that npm
        # Trusted Publishing requires.
        run: |
          corepack enable npm
          corepack prepare --activate
          npm --version
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches package.json version
        # The release PR already bumped package.json. We just sanity-check
        # that the pushed tag matches, then publish — no version mutation
        # here, so the npm tarball is exactly what merged to main.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=> $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"
      - name: Build
        run: npm run build
      - name: Publish to npm with provenance
        # Pre-release tags (vX.Y.Z-foo) go to the `next` dist-tag so they
        # don't replace `latest`. Stable tags (vX.Y.Z) go to `latest`.
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "Pre-release detected; publishing to dist-tag 'next'"
            npm publish --provenance --access public --tag next
          else
            echo "Stable release; publishing to dist-tag 'latest'"
            npm publish --provenance --access public
          fi
